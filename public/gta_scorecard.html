<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technology Foundation Scorecard Groundwork Technology Advisors</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f3;padding:2rem 1rem;color:#2c2c2c}
.sc-wrap{max-width:660px;margin:0 auto}
.sc-header{background:#1a3a5c;border-radius:8px;padding:20px 24px;margin-bottom:24px}
.sc-header-top{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.sc-htitle{font-family:Georgia,serif;font-size:18px;font-weight:700;color:white}
.sc-hsub{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase}
.sc-hdesc{font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6;border-top:0.5px solid rgba(255,255,255,0.15);padding-top:10px}
.sc-progress-bar{height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:14px}
.sc-progress-fill{height:3px;background:#4a9fd4;border-radius:2px;transition:width 0.3s}
.sc-progress-label{font-size:10px;color:rgba(255,255,255,0.45);margin-top:5px;letter-spacing:0.5px}
.sc-section-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#2e7ab8;margin:20px 0 10px}
.q-card{background:white;border:0.5px solid #d0dce8;border-radius:8px;padding:14px 16px;margin-bottom:8px}
.q-text{font-size:13px;color:#1a3a5c;line-height:1.6;margin-bottom:10px;font-weight:600}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.q-opt{font-size:11.5px;padding:7px 10px;border-radius:6px;border:0.5px solid #c0ccd8;background:#f5f7fa;color:#444;cursor:pointer;line-height:1.4;transition:all 0.15s;text-align:left}
.q-opt:hover{border-color:#2e7ab8;color:#1a3a5c;background:#e8f0f7}
.q-opt.selected{background:#e8f0f7;border-color:#2e7ab8;color:#1a3a5c;font-weight:600}
.q-opt.selected-concern{background:#fff3f0;border-color:#d85a30;color:#712b13;font-weight:600}
.sc-cta{margin-top:24px;text-align:center}
.sc-score-card{background:white;border:0.5px solid #d0dce8;border-radius:12px;padding:24px;display:none}
.sc-score-num{font-family:Georgia,serif;font-size:52px;font-weight:700;line-height:1;color:#1a3a5c}
.sc-score-band{display:inline-block;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;margin-top:10px}
.sc-finding{display:flex;gap:10px;padding:10px 12px;border-radius:6px;margin-bottom:6px;font-size:12px;line-height:1.55;align-items:flex-start}
.sc-finding-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.sc-rec{margin-top:16px;padding:14px 16px;background:#e8f0f7;border-radius:8px;border-left:3px solid #2e7ab8}
.sc-rec-title{font-size:11px;font-weight:700;color:#1a3a5c;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.sc-rec-text{font-size:12px;color:#1a3a5c;line-height:1.6}
button.sc-submit{width:100%;padding:12px;background:#1a3a5c;color:white;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:0.3px;opacity:0.4;transition:opacity 0.2s}
button.sc-submit.ready{opacity:1}
a.sc-restart{margin-top:16px;font-size:12px;color:#2e7ab8;cursor:pointer;text-decoration:underline;text-align:center;display:block}
</style>
</head>
<body>
<div class="sc-wrap">
  <div class="sc-header">
    <div class="sc-header-top">
      <div>
        <svg width="44" height="32" viewBox="0 0 44 32" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="0" width="28" height="8" rx="2" fill="white"/>
          <rect x="4" y="11" width="36" height="8" rx="2" fill="white" opacity="0.6"/>
          <rect x="0" y="22" width="44" height="8" rx="2" fill="white" opacity="0.3"/>
        </svg>
      </div>
      <div>
        <div class="sc-htitle">Technology Foundation Scorecard</div>
        <div class="sc-hsub">Groundwork Technology Advisors</div>
      </div>
    </div>
    <div class="sc-hdesc">10 questions for CEOs and CTOs. Takes about 3 minutes. Your score identifies where your technology environment is strong and where it may be holding your growth back.</div>
    <div class="sc-progress-bar"><div class="sc-progress-fill" id="prog" style="width:0%"></div></div>
    <div class="sc-progress-label" id="prog-label">0 of 12 answered</div>
  </div>
  <div id="questions-wrap"></div>
  <div class="sc-cta"><button class="sc-submit" id="submit-btn" onclick="showResults()">See my results</button></div>
  <div class="sc-score-card" id="results"></div>
</div>
<script>
const questions=[{section:"Technology visibility",text:"Does your leadership team have a shared, written understanding of your current technology environment: what systems you run, how they connect, and where the gaps are?",opts:[{label:"Yes, documented and current",score:3,concern:false},{label:"Mostly, but it lives in one person's head",score:1,concern:true},{label:"No, we lack a clear picture",score:0,concern:true},{label:"Partially: outdated documentation exists",score:1,concern:true}]},{section:"Technology visibility",text:"When your executive team discusses technology priorities, do they generally agree on what the top three are?",opts:[{label:"Yes, aligned and documented",score:3,concern:false},{label:"Mostly, but priorities shift frequently",score:1,concern:true},{label:"No: IT and leadership are often misaligned",score:0,concern:true},{label:"We haven't had that conversation formally",score:0,concern:true}]},{section:"Security & compliance",text:"How confident are you in your current security and compliance posture (HIPAA, SOC 2, or other relevant requirements for your industry)?",opts:[{label:"Yes, recently reviewed",score:3,concern:false},{label:"Reasonably confident, no recent incidents",score:2,concern:false},{label:"Uncertain: it hasn't been formally assessed",score:0,concern:true},{label:"Concerned: we know there are gaps",score:0,concern:true}]},{section:"Security & compliance",text:"Do you have a documented, tested disaster recovery and business continuity plan?",opts:[{label:"Yes, documented and tested in the past year",score:3,concern:false},{label:"Yes, documented but not recently tested",score:1,concern:true},{label:"No formal plan exists",score:0,concern:true},{label:"Partial: some systems are covered",score:1,concern:true}]},{section:"Engineering & delivery",text:"Does your engineering team consistently deliver on commitments: shipping what they say they'll ship, when they say they'll ship it?",opts:[{label:"Yes, delivery is reliable and predictable",score:3,concern:false},{label:"Sometimes: velocity varies significantly",score:1,concern:true},{label:"No, we frequently miss or descope",score:0,concern:true},{label:"We're too early-stage to assess this yet",score:2,concern:false}]},{section:"Engineering & delivery",text:"Is your technical debt at a level where it meaningfully slows down new development or creates operational risk?",opts:[{label:"No, debt is manageable and tracked",score:3,concern:false},{label:"Somewhat: it slows us down occasionally",score:1,concern:true},{label:"Yes, it's a significant drag on the team",score:0,concern:true},{label:"We don't have good visibility into it",score:0,concern:true}]},{section:"Team & org design",text:"Do you have the right technology leadership in place for your current stage of growth?",opts:[{label:"Yes, strong CTO/CIO and team",score:3,concern:false},{label:"Mostly, but leadership bandwidth is stretched",score:1,concern:true},{label:"No, we have a gap at the leadership level",score:0,concern:true},{label:"We rely on an outsourced or fractional model",score:2,concern:false}]},{section:"Team & org design",text:"Does your technology team structure reflect where you are headed, or where you were 18 months ago?",opts:[{label:"Reflects where we're headed",score:3,concern:false},{label:"Mostly current: some roles need rethinking",score:1,concern:true},{label:"It's behind: hasn't kept pace with growth",score:0,concern:true},{label:"We haven't formally assessed this",score:0,concern:true}]},{section:"Strategy & roadmap",text:"Do you have a technology roadmap that is practical, prioritized, and actively used by your leadership team?",opts:[{label:"Yes, current and actively referenced",score:3,concern:false},{label:"We have one but it's rarely referenced",score:1,concern:true},{label:"No formal roadmap exists",score:0,concern:true},{label:"We have priorities but nothing documented",score:1,concern:true}]},{section:"Strategy & roadmap",text:"Overall, how well does your technology environment support the business goals you're trying to achieve in the next 18 months?",opts:[{label:"Very well: technology is an enabler",score:3,concern:false},{label:"Adequately: it gets the job done",score:2,concern:false},{label:"Poorly: technology is holding us back",score:0,concern:true},{label:"Uncertain: we're not sure what the gaps are",score:0,concern:true}]},{section:"AI readiness",text:"Do you have a clear picture of where AI is already being used across your organization, including tools your staff adopted on their own?",opts:[{label:"Yes, we have full visibility and a policy in place",score:3,concern:false},{label:"Partially: we know some uses but not all",score:1,concern:true},{label:"No, we have limited visibility into AI adoption",score:0,concern:true},{label:"We have not looked into it formally",score:0,concern:true}]},{section:"AI readiness",text:"Does your organization have governance in place for how AI can and cannot be used, particularly around sensitive or regulated data?",opts:[{label:"Yes, documented policy exists and staff are aware",score:3,concern:false},{label:"Informally: some guidance exists but nothing formal",score:1,concern:true},{label:"No formal governance or policy exists",score:0,concern:true},{label:"We rely on vendor terms and have not added our own",score:0,concern:true}]}];
const answers=new Array(10).fill(null);
function renderQuestions(){const wrap=document.getElementById('questions-wrap');let currentSection='';let html='';questions.forEach((q,i)=>{if(q.section!==currentSection){currentSection=q.section;html+=`<div class="sc-section-label">${q.section}</div>`;}html+=`<div class="q-card"><div class="q-text">${i+1}. ${q.text}</div><div class="q-options">`;q.opts.forEach((o,j)=>{html+=`<button class="q-opt" onclick="selectAnswer(${i},${j})" id="opt-${i}-${j}">${o.label}</button>`;});html+=`</div></div>`;});wrap.innerHTML=html;}
function selectAnswer(qi,oi){answers[qi]=oi;questions[qi].opts.forEach((o,j)=>{const btn=document.getElementById(`opt-${qi}-${j}`);btn.classList.remove('selected','selected-concern');});const chosen=questions[qi].opts[oi];const btn=document.getElementById(`opt-${qi}-${oi}`);btn.classList.add(chosen.concern?'selected-concern':'selected');const answered=answers.filter(a=>a!==null).length;document.getElementById('prog').style.width=(answered/12*100)+'%';document.getElementById('prog-label').textContent=`${answered} of 12 answered`;if(answered===12)document.getElementById('submit-btn').classList.add('ready');}
function showResults(){const answered=answers.filter(a=>a!==null).length;if(answered<12)return;let total=0;const concerns=[];const strengths=[];questions.forEach((q,i)=>{const opt=q.opts[answers[i]];total+=opt.score;if(opt.concern){concerns.push({section:q.section,text:q.text.split('?')[0]+'?'});}else if(opt.score===3){strengths.push(q.section);}});const pct=Math.round(total/36*100);let band,bandBg,bandColor,rec,recTitle;if(pct>=80){band='Strong foundation';bandBg='#eaf3de';bandColor='#3b6d11';recTitle='Where Groundwork can help';rec='Your technology environment is in solid shape. An outside perspective can help validate your roadmap, stress-test your compliance posture, or prepare for a period of accelerated growth or M&A activity.';}else if(pct>=55){band='Gaps worth addressing';bandBg='#faeeda';bandColor='#854f0b';recTitle='Where Groundwork can help';rec='You have a working technology environment, but the gaps identified above carry real risk as you scale. A Technology Ecosystem Assessment or Roadmap engagement would give you a clear, prioritized picture of what to address first.';}else{band='Foundation needs attention';bandBg='#fcebeb';bandColor='#a32d2d';recTitle='Where Groundwork can help';rec='Your technology environment has significant gaps that are likely already affecting your ability to execute. A structured assessment is the right first step it gives leadership a shared, honest picture and a practical roadmap before investing in fixes.';}
let findingsHtml='';if(concerns.length>0){findingsHtml+=`<div style="font-size:11px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Areas to address</div>`;concerns.slice(0,5).forEach(c=>{findingsHtml+=`<div class="sc-finding" style="background:#fff8f6"><div class="sc-finding-dot" style="background:#d85a30"></div><div style="color:#712b13">${c.section} ${c.text}</div></div>`;});}if(strengths.length>0){const u=[...new Set(strengths)];findingsHtml+=`<div style="font-size:11px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;margin:12px 0 8px">Strengths</div>`;u.forEach(s=>{findingsHtml+=`<div class="sc-finding" style="background:#eaf3de"><div class="sc-finding-dot" style="background:#3b6d11"></div><div style="color:#27500a">${s}</div></div>`;});}

  const aiConcerns = concerns.filter(c => c.section === 'AI readiness');
  let aiRecHtml = '';
  if(aiConcerns.length > 0){
    aiRecHtml = '<div class="sc-rec" style="background:#f0f5fa;border-left-color:#4a9fd4;margin-top:10px"><div class="sc-rec-title" style="color:#1a3a5c">AI readiness gaps identified</div><div class="sc-rec-text" style="color:#1a3a5c">Your responses indicate gaps in AI visibility or governance. An AI Readiness Assessment would give you a clear picture of where AI is already in use, what governance is needed, and where genuine opportunity exists. <a href="/services#ai-readiness" style="color:#2e7ab8">Learn more about this engagement.</a></div></div>';
  }
document.getElementById('hidden_score').value = pct + '%';
  document.getElementById('hidden_band').value = band;
  document.getElementById('hidden_band_bg').value = bandBg;
  document.getElementById('hidden_band_color').value = bandColor;
  document.getElementById('hidden_rec').value = rec;
  document.getElementById('hidden_concerns').value = concerns.map(c => c.section + ': ' + c.text).join(' | ');
  const r=document.getElementById('results');r.innerHTML=`<div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:16px;border-bottom:0.5px solid #d0dce8;padding-bottom:16px"><div><div class="sc-score-num">${pct}<span style="font-size:22px;color:#888">%</span></div><div style="font-size:12px;color:#666;margin-top:4px">Technology foundation score</div><div class="sc-score-band" style="background:${bandBg};color:${bandColor}">${band}</div></div><div style="flex:1;font-size:12px;color:#666;line-height:1.6;padding-bottom:4px">Based on ${answered} responses across 4 dimensions: technology visibility, security & compliance, engineering delivery, and strategy.</div></div><div>${findingsHtml}</div>${aiRecHtml}<div class="sc-rec"><div class="sc-rec-title">${recTitle}</div><div class="sc-rec-text">${rec}</div></div><div style="margin-top:20px;padding:20px;background:#f0f5fa;border-radius:8px;border:0.5px solid #d0dce8">
<div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1a3a5c;margin-bottom:4px">Get your results by email</div>
<div style="font-size:12px;color:#555;margin-bottom:14px;line-height:1.6">Enter your details and we will send you a summary along with some thoughts on next steps based on your score.</div>
<form id="sc-capture-form" style="display:flex;flex-direction:column;gap:8px" onsubmit="handleScoreSubmit(event)">
<input type="hidden" id="hidden_score">
<input type="hidden" id="hidden_band">
<input type="hidden" id="hidden_band_bg">
<input type="hidden" id="hidden_band_color">
<input type="hidden" id="hidden_rec">
<input type="hidden" id="hidden_concerns">
<input type="text" name="Full Name" placeholder="Your name" required style="padding:9px 12px;border:0.5px solid #c0ccd8;border-radius:5px;font-size:13px;background:white;color:#2c2c2c">
<input type="text" name="Company" placeholder="Company name" style="padding:9px 12px;border:0.5px solid #c0ccd8;border-radius:5px;font-size:13px;background:white;color:#2c2c2c">
<input type="email" name="Email" placeholder="Email address" required style="padding:9px 12px;border:0.5px solid #c0ccd8;border-radius:5px;font-size:13px;background:white;color:#2c2c2c">
<button type="submit" style="padding:10px;background:#1a3a5c;color:white;border:none;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.3px">Send my results</button>
</form>
<div id="sc-form-success" style="display:none;font-size:12px;color:#3b6d11;background:#eaf3de;padding:10px 12px;border-radius:5px;margin-top:8px">Thanks, we will be in touch shortly.</div>
</div>
<div style="margin-top:12px;text-align:center;font-size:12px;color:#2e7ab8"><a href="#" onclick="restartScorecard();return false;" style="color:#2e7ab8">Start over</a></div>`;
r.style.display='block';document.getElementById('questions-wrap').style.display='none';document.querySelector('.sc-cta').style.display='none';}
function restartScorecard(){answers.fill(null);document.getElementById('results').style.display='none';document.getElementById('questions-wrap').style.display='block';document.querySelector('.sc-cta').style.display='block';document.getElementById('prog').style.width='0%';document.getElementById('prog-label').textContent='0 of 12 answered';document.getElementById('submit-btn').classList.remove('ready');renderQuestions();}
renderQuestions();

function buildReportHTML(nameVal, companyVal, emailVal, score, band, bandBg, bandColor, rawConcerns, rec) {
  const dateStr = new Date().toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
  const concernItems = rawConcerns
    ? rawConcerns.split(' | ').map(function(c) {
        var short = shortLabels[c] || c;
        var parts = short.split(': ');
        return '<tr><td style="padding:8px 12px;border-bottom:0.5px solid #e8eef4;color:#5a7a99;font-size:11px;white-space:nowrap;vertical-align:top">' + (parts[0]||'') + '</td><td style="padding:8px 12px;border-bottom:0.5px solid #e8eef4;font-size:12px;color:#2c2c2c">' + (parts[1]||short) + '</td></tr>';
      }).join('')
    : '<tr><td colspan="2" style="padding:8px 12px;font-size:12px;color:#3b6d11">No significant gaps identified</td></tr>';

  return '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Technology Foundation Scorecard - ' + (companyVal||nameVal) + '</title>'
    + '<style>body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f3;margin:0;padding:24px;color:#2c2c2c}.report{max-width:680px;margin:0 auto;background:white;border-radius:8px;overflow:hidden;border:0.5px solid #d0dce8}.rh{background:#1a3a5c;padding:24px 28px;position:relative;overflow:hidden}.rha{position:absolute;right:0;top:0;width:80px;height:100%;background:#2e7ab8;opacity:0.15}.rm{display:flex;align-items:center;gap:12px;margin-bottom:14px}.rfirm{font-family:Georgia,serif;font-size:16px;font-weight:700;color:white}.rfsub{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:0.5px}.rtitle{font-family:Georgia,serif;font-size:19px;font-weight:700;color:white;margin-bottom:4px}.rdate{font-size:11px;color:rgba(255,255,255,0.45)}.rb{padding:24px 28px}.sl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#2e7ab8;margin:20px 0 10px}.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px}.ic{background:#f0f5fa;border-radius:6px;padding:10px 12px}.il{font-size:10px;color:#5a7a99;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px}.iv{font-size:13px;font-weight:700;color:#1a3a5c}.sb{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:6px}.ct{width:100%;border-collapse:collapse;border:0.5px solid #d0dce8}.ct th{text-align:left;padding:8px 12px;background:#e8f0f7;color:#1a3a5c;font-size:10px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}.recbox{background:#e8f0f7;border-radius:6px;border-left:3px solid #2e7ab8;padding:14px 16px;margin-top:4px}.rectitle{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1a3a5c;margin-bottom:6px}.rectext{font-size:12px;color:#1a3a5c;line-height:1.65}.rf{background:#1a3a5c;padding:12px 28px;display:flex;justify-content:space-between;align-items:center}.rfl{font-size:10px;color:rgba(255,255,255,0.5)}.rfr{font-size:10px;color:#4a9fd4}</style>'
    + '</head><body><div class="report">'
    + '<div class="rh"><div class="rha"></div>'
    + '<div class="rm"><svg width="40" height="30" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="0" width="26" height="8" rx="2" fill="white"/><rect x="3" y="11" width="34" height="8" rx="2" fill="white" opacity="0.6"/><rect x="0" y="22" width="40" height="8" rx="2" fill="white" opacity="0.3"/></svg>'
    + '<div><div class="rfirm">Groundwork Technology Advisors</div><div class="rfsub">groundworktechnologyadvisors.com</div></div></div>'
    + '<div class="rtitle">Technology Foundation Scorecard Results</div>'
    + '<div class="rdate">Completed ' + dateStr + '</div></div>'
    + '<div class="rb">'
    + '<div class="sl">Respondent</div>'
    + '<div class="ig"><div class="ic"><div class="il">Name</div><div class="iv">' + nameVal + '</div></div>'
    + '<div class="ic"><div class="il">Company</div><div class="iv">' + (companyVal||'Not provided') + '</div></div></div>'
    + '<div class="sl" style="margin-top:16px">Score</div>'
    + '<div class="ig">'
    + '<div class="ic"><div class="il">Foundation score</div><div class="iv" style="font-size:28px">' + score + '</div>'
    + '<div class="sb" style="background:' + bandBg + ';color:' + bandColor + '">' + band + '</div></div>'
    + '<div class="ic"><div class="il">Assessment</div><div class="iv" style="font-size:12px;font-weight:400;line-height:1.55;margin-top:2px">Based on 12 questions across technology visibility, security and compliance, engineering delivery, team and org design, and AI readiness.</div></div></div>'
    + '<div class="sl" style="margin-top:16px">Gaps identified</div>'
    + '<table class="ct"><thead><tr><th>Area</th><th>Gap</th></tr></thead><tbody>' + concernItems + '</tbody></table>'
    + '<div class="sl" style="margin-top:16px">Recommendation</div>'
    + '<div class="recbox"><div class="rectitle">Where Groundwork can help</div><div class="rectext">' + rec + '</div></div>'
    + '</div>'
    + '<div class="rf"><div class="rfl">Prepared by Groundwork Technology Advisors LLC</div><div class="rfr">info@groundworktechnologyadvisors.com</div></div>'
    + '</div></body></html>';
}

function handleScoreSubmit(e){
  e.preventDefault();
  var form = document.getElementById('sc-capture-form');
  var nameVal = form.querySelector('[name="Full Name"]').value;
  var companyVal = form.querySelector('[name="Company"]').value;
  var emailVal = form.querySelector('[name="Email"]').value;
  var score = document.getElementById('hidden_score').value;
  var band = document.getElementById('hidden_band').value;
  var bandBg = document.getElementById('hidden_band_bg').value;
  var bandColor = document.getElementById('hidden_band_color').value;
  var rec = document.getElementById('hidden_rec').value;
  var rawConcerns = document.getElementById('hidden_concerns').value;

  var concernList = rawConcerns
    ? rawConcerns.split(' | ').map(function(c){ return shortLabels[c]||c; }).join('\n')
    : 'None flagged';

  var reportHTML = buildReportHTML(nameVal, companyVal, emailVal, score, band, bandBg, bandColor, rawConcerns, rec);
  var reportBlob = new Blob([reportHTML], {type:'text/html'});
  var safeName = (companyVal||nameVal).replace(/[^a-zA-Z0-9]/g,'-');
  var dateStr = new Date().toISOString().slice(0,10);
  var fileName = 'GTA-Scorecard-' + safeName + '-' + dateStr + '.html';

  var data = new FormData();
  data.append('_subject', 'Scorecard: ' + score + ' (' + band + ') ' + (companyVal||nameVal));
  data.append('Full Name', nameVal);
  data.append('Company', companyVal||'Not provided');
  data.append('Email', emailVal);
  data.append('Score', score);
  data.append('Result', band);
  data.append('Gaps Identified', concernList);
  data.append('Source', 'Technology Foundation Scorecard');
  data.append('attachment', reportBlob, fileName);

  fetch('https://formspree.io/f/xpqkqjky', {method:'POST', body:data, headers:{'Accept':'application/json'}})
    .then(function(r){
      if(r.ok){
        form.style.display='none';
        document.getElementById('sc-form-success').style.display='block';
      } else {
        document.getElementById('sc-form-success').textContent='Something went wrong. Please email info@groundworktechnologyadvisors.com directly.';
        document.getElementById('sc-form-success').style.background='#fcebeb';
        document.getElementById('sc-form-success').style.color='#a32d2d';
        document.getElementById('sc-form-success').style.display='block';
      }
    })
    .catch(function(){
      document.getElementById('sc-form-success').textContent='Something went wrong. Please email info@groundworktechnologyadvisors.com directly.';
      document.getElementById('sc-form-success').style.display='block';
    });
}
